<div class="overlay" (click)="close()">
  <section class="panel" (click)="$event.stopPropagation()">
    <header>
      <h2>Il tuo account</h2>
      <button type="button" class="icon" (click)="close()" aria-label="Chiudi">×</button>
    </header>

    <p class="username">{{ account().username }}</p>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="app-field">
        <div class="app-field-header">
          <span>Altezza</span>
          <strong>{{ form.controls.altezza.value }} cm</strong>
        </div>
        <input
          type="range"
          class="app-range"
          formControlName="altezza"
          min="100"
          max="250"
          step="1"
        />
        <div class="app-range-ticks">
          <span>100</span>
          <span>175</span>
          <span>250</span>
        </div>
      </div>

      <div class="app-field">
        <div class="app-field-header">
          <span>Peso</span>
          <strong>{{ form.controls.peso.value }} kg</strong>
        </div>
        <input
          type="range"
          class="app-range"
          formControlName="peso"
          min="40"
          max="300"
          step="1"
        />
        <div class="app-range-ticks">
          <span>40</span>
          <span>120</span>
          <span>300</span>
        </div>
      </div>

      <div class="app-field">
        <span class="field-label">Genere</span>
        <div class="app-segmented" role="group" aria-label="Genere">
          <button
            type="button"
            [class.active]="form.controls.genere.value === 'M'"
            (click)="setGenere('M')"
          >
            Maschio
          </button>
          <button
            type="button"
            [class.active]="form.controls.genere.value === 'F'"
            (click)="setGenere('F')"
          >
            Femmina
          </button>
        </div>
      </div>

      @if (message) {
        <p class="msg">{{ message }}</p>
      }

      <button type="submit" class="submit-btn">Salva modifiche</button>
    </form>
  </section>
</div>
