<section class="auth-card">
  <header>
    <h1>Alcol Tester</h1>
    <p>Accedi o crea un account per monitorare il tasso alcolemico</p>
  </header>

  <div class="tabs">
    <button
      type="button"
      [class.active]="mode() === 'login'"
      (click)="setMode('login')"
    >
      Login
    </button>
    <button
      type="button"
      [class.active]="mode() === 'register'"
      (click)="setMode('register')"
    >
      Registrati
    </button>
  </div>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  @if (mode() === 'login') {
    <form [formGroup]="loginForm" (ngSubmit)="submitLogin()">
      <label>
        Username
        <input type="text" formControlName="username" autocomplete="username" />
      </label>
      <label>
        Password
        <span class="password-wrap">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="toggleShowPassword()"
            [attr.aria-label]="showPassword() ? 'Nascondi password' : 'Mostra password'"
            [attr.aria-pressed]="showPassword()"
          >
            {{ showPassword() ? 'Nascondi' : 'Mostra' }}
          </button>
        </span>
      </label>
      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Accesso...' : 'Entra' }}
      </button>
    </form>
  } @else {
    <form [formGroup]="registerForm" (ngSubmit)="submitRegister()">
      <label>
        Username
        <input type="text" formControlName="username" autocomplete="username" />
      </label>
      <label>
        Password
        <span class="password-wrap">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="toggleShowPassword()"
            [attr.aria-label]="showPassword() ? 'Nascondi password' : 'Mostra password'"
            [attr.aria-pressed]="showPassword()"
          >
            {{ showPassword() ? 'Nascondi' : 'Mostra' }}
          </button>
        </span>
      </label>

      <div class="app-field">
        <div class="app-field-header">
          <span>Altezza</span>
          <strong>{{ registerForm.controls.altezza.value }} cm</strong>
        </div>
        <input
          type="range"
          class="app-range"
          formControlName="altezza"
          min="100"
          max="250"
          step="1"
        />
        <div class="app-range-ticks">
          <span>100</span>
          <span>175</span>
          <span>250</span>
        </div>
      </div>

      <div class="app-field">
        <div class="app-field-header">
          <span>Peso</span>
          <strong>{{ registerForm.controls.peso.value }} kg</strong>
        </div>
        <input
          type="range"
          class="app-range"
          formControlName="peso"
          min="40"
          max="300"
          step="1"
        />
        <div class="app-range-ticks">
          <span>40</span>
          <span>120</span>
          <span>300</span>
        </div>
      </div>

      <div class="app-field">
        <span class="field-label">Genere</span>
        <div class="app-segmented" role="group" aria-label="Genere">
          <button
            type="button"
            [class.active]="registerForm.controls.genere.value === 'M'"
            (click)="setGenere('M')"
          >
            Maschio
          </button>
          <button
            type="button"
            [class.active]="registerForm.controls.genere.value === 'F'"
            (click)="setGenere('F')"
          >
            Femmina
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Registrazione...' : 'Crea account' }}
      </button>
    </form>
  }
</section>
